<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BidFlow - AI RFP Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 48px;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        
        .header p {
            font-size: 18px;
            opacity: 0.9;
        }
        
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 20px;
        }
        
        .panel {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .panel h2 {
            font-size: 20px;
            margin-bottom: 16px;
            color: #333;
        }
        
        textarea {
            width: 100%;
            height: 400px;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            resize: vertical;
        }
        
        textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 16px;
        }
        
        button {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: #667eea;
            color: white;
            flex: 1;
        }
        
        .btn-primary:hover:not(:disabled) {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        
        .btn-primary:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        
        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }
        
        .btn-secondary:hover {
            background: #e0e0e0;
        }
        
        .status-bar {
            display: flex;
            gap: 10px;
            margin-top: 16px;
            flex-wrap: wrap;
        }
        
        .badge {
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .badge-pending {
            background: #fff3cd;
            color: #856404;
        }
        
        .badge-processing {
            background: #cfe2ff;
            color: #084298;
            animation: pulse 1.5s infinite;
        }
        
        .badge-completed {
            background: #d1e7dd;
            color: #0f5132;
        }
        
        .badge-failed {
            background: #f8d7da;
            color: #842029;
        }
        
        .badge-info {
            background: #e7f3ff;
            color: #004085;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }
        
        .log-container {
            height: 500px;
            overflow-y: auto;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 12px;
            background: #f8f9fa;
        }
        
        .log-entry {
            padding: 8px 12px;
            margin-bottom: 8px;
            border-left: 4px solid #667eea;
            background: white;
            border-radius: 4px;
            animation: slideIn 0.3s;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        
        .log-agent {
            font-weight: 600;
            color: #667eea;
        }
        
        .output-container {
            height: 500px;
            overflow-y: auto;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 16px;
            background: #f8f9fa;
            font-family: Georgia, serif;
            line-height: 1.6;
        }
        
        .output-container h1 {
            font-size: 24px;
            margin-bottom: 12px;
        }
        
        .output-container h2 {
            font-size: 20px;
            margin-top: 20px;
            margin-bottom: 10px;
        }
        
        .output-container p {
            margin-bottom: 12px;
        }
        
        .error {
            background: #f8d7da;
            border: 2px solid #f5c2c7;
            color: #842029;
            padding: 12px;
            border-radius: 8px;
            margin-top: 16px;
        }
        
        .empty-state {
            text-align: center;
            color: #999;
            padding: 40px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚀 BidFlow</h1>
            <p>AI-Powered RFP Proposal Generator | Multi-Agent Architecture</p>
        </div>
        
        <div class="grid">
            <!-- Input Panel -->
            <div class="panel">
                <h2>📝 RFP Input</h2>
                <textarea id="rfpInput" placeholder="Paste your RFP text here...">We need a HIPAA-compliant SaaS platform with SSO integration and 99.9% uptime SLA.

Requirements:
- ISO 27001 and SOC 2 compliance
- Single Sign-On (SAML 2.0 or OIDC)
- 99.9% uptime SLA
- Multi-tenant architecture
- End-to-end encryption
- Audit logging
- Disaster recovery plan</textarea>
                
                <div class="button-group">
                    <button class="btn-secondary" onclick="loadDemo()">Load Demo</button>
                    <button class="btn-primary" id="generateBtn" onclick="generate()">Generate Proposal</button>
                </div>
                
                <div class="status-bar" id="statusBar"></div>
                <div id="errorContainer"></div>
            </div>
            
            <!-- Agent Timeline -->
            <div class="panel">
                <h2>⚙️ Agent Timeline</h2>
                <div class="log-container" id="logContainer">
                    <div class="empty-state">
                        Click "Generate Proposal" to see agents in action...
                    </div>
                </div>
            </div>
            
            <!-- Output Panel -->
            <div class="panel">
                <h2>📄 Generated Proposal</h2>
                <div class="output-container" id="outputContainer">
                    <div class="empty-state">
                        Your AI-generated proposal will appear here...
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        const API_BASE = 'https://k5sjskojzg.execute-api.us-east-1.amazonaws.com';
        let pollInterval = null;
        
        function loadDemo() {
            document.getElementById('rfpInput').value = `We need a HIPAA-compliant SaaS platform with SSO integration and 99.9% uptime SLA.

Requirements:
- ISO 27001 and SOC 2 compliance
- Single Sign-On (SAML 2.0 or OIDC)
- 99.9% uptime SLA
- Multi-tenant architecture
- End-to-end encryption
- Audit logging
- Disaster recovery plan`;
        }
        
        function updateStatus(status, cost = null, elapsed = null) {
            const statusBar = document.getElementById('statusBar');
            let html = '';
            
            if (status) {
                const statusClass = {
                    'pending': 'badge-pending',
                    'processing': 'badge-processing',
                    'completed': 'badge-completed',
                    'failed': 'badge-failed'
                }[status] || 'badge-info';
                
                const statusText = {
                    'pending': '⏳ Pending',
                    'processing': '⚙️ Processing',
                    'completed': '✅ Completed',
                    'failed': '❌ Failed'
                }[status] || status;
                
                html += `<span class="badge ${statusClass}">${statusText}</span>`;
            }
            
            if (cost !== null) {
                html += `<span class="badge badge-info">💰 Cost: $${cost.toFixed(4)}</span>`;
            }
            
            if (elapsed !== null) {
                html += `<span class="badge badge-info">⏱️ Time: ${elapsed.toFixed(1)}s</span>`;
            }
            
            statusBar.innerHTML = html;
        }
        
        function addLogEntry(agent, message) {
            const logContainer = document.getElementById('logContainer');
            
            // Remove empty state
            if (logContainer.querySelector('.empty-state')) {
                logContainer.innerHTML = '';
            }
            
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.innerHTML = `<span class="log-agent">[${agent}]</span> ${message}`;
            logContainer.appendChild(entry);
            logContainer.scrollTop = logContainer.scrollHeight;
        }
        
        function showError(message) {
            const errorContainer = document.getElementById('errorContainer');
            errorContainer.innerHTML = `<div class="error"><strong>Error:</strong> ${message}</div>`;
        }
        
        function clearError() {
            document.getElementById('errorContainer').innerHTML = '';
        }
        
        function renderMarkdown(markdown) {
            // Simple markdown rendering
            let html = markdown
                .replace(/^# (.*$)/gim, '<h1>$1</h1>')
                .replace(/^## (.*$)/gim, '<h2>$1</h2>')
                .replace(/^### (.*$)/gim, '<h3>$1</h3>')
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.*?)\*/g, '<em>$1</em>')
                .replace(/\n\n/g, '</p><p>')
                .replace(/\n/g, '<br>');
            
            return '<p>' + html + '</p>';
        }
        
        async function pollStatus(runId) {
            try {
                const response = await fetch(`${API_BASE}/runs/${runId}`);
                const data = await response.json();
                
                updateStatus(data.status, data.cost_estimate_usd, data.elapsed_seconds);
                
                if (data.status === 'completed') {
                    // Show log entries
                    if (data.log && data.log.length > 0) {
                        document.getElementById('logContainer').innerHTML = '';
                        data.log.forEach(entry => {
                            addLogEntry(entry.agent, entry.msg);
                        });
                    }
                    
                    // Show final proposal
                    if (data.final_markdown) {
                        document.getElementById('outputContainer').innerHTML = renderMarkdown(data.final_markdown);
                    }
                    
                    // Stop polling
                    if (pollInterval) {
                        clearInterval(pollInterval);
                        pollInterval = null;
                    }
                    
                    document.getElementById('generateBtn').disabled = false;
                    document.getElementById('generateBtn').textContent = 'Generate Proposal';
                    
                } else if (data.status === 'failed') {
                    showError(data.error || 'Pipeline execution failed');
                    
                    // Stop polling
                    if (pollInterval) {
                        clearInterval(pollInterval);
                        pollInterval = null;
                    }
                    
                    document.getElementById('generateBtn').disabled = false;
                    document.getElementById('generateBtn').textContent = 'Generate Proposal';
                }
                
            } catch (error) {
                console.error('Poll error:', error);
                // Don't stop polling on transient errors
            }
        }
        
        async function generate() {
            const rfpText = document.getElementById('rfpInput').value.trim();
            
            if (!rfpText) {
                showError('Please enter RFP text');
                return;
            }
            
            // Reset UI
            clearError();
            document.getElementById('logContainer').innerHTML = '<div class="empty-state">Starting pipeline...</div>';
            document.getElementById('outputContainer').innerHTML = '<div class="empty-state">Generating proposal...</div>';
            updateStatus('pending');
            
            // Disable button
            const btn = document.getElementById('generateBtn');
            btn.disabled = true;
            btn.textContent = 'Running...';
            
            // Clear any existing poll interval
            if (pollInterval) {
                clearInterval(pollInterval);
                pollInterval = null;
            }
            
            try {
                // Start async run
                const response = await fetch(`${API_BASE}/run`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        project_id: 'demo-001',
                        rfp_text: rfpText
                    })
                });
                
                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error || `HTTP ${response.status}`);
                }
                
                const data = await response.json();
                
                addLogEntry('System', `Run started with ID: ${data.run_id}`);
                addLogEntry('System', 'Pipeline executing in background...');
                
                // Start polling
                pollInterval = setInterval(() => {
                    pollStatus(data.run_id);
                }, 3000);
                
                // Do initial poll immediately
                pollStatus(data.run_id);
                
            } catch (error) {
                showError(error.message);
                btn.disabled = false;
                btn.textContent = 'Generate Proposal';
            }
        }
    </script>
</body>
</html>
